<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="21+打卡">
  <meta name="description" content="21+ 打卡APP - 坚持21天，养成好习惯">
  <title>21+ 打卡</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
  <style>
    :root {
      --primary: #1a1a2e;
      --secondary: #16213e;
      --accent: #ff6b35;
      --success: #4ade80;
      --text-primary: #ffffff;
      --text-secondary: #94a3b8;
      --bg-card: #1f2937;
      --border: #374151;
      --shadow: rgba(0, 0, 0, 0.3);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: var(--text-primary);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }
    #app {
      max-width: 480px;
      margin: 0 auto;
      height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .page {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 20px;
      padding-bottom: 120px;
      min-height: 0;
    }
    .page::-webkit-scrollbar { width: 0; background: transparent; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .header-content { flex: 1; display: flex; align-items: center; gap: 12px; }
    .header-icon { font-size: 28px; }
    .header-title { font-size: 20px; font-weight: 600; }
    .header-actions { display: flex; gap: 8px; }
    .header-spacer { width: 40px; }
    .title {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #ff8c5a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle { color: var(--text-secondary); font-size: 13px; margin-top: 4px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 24px; border: none; border-radius: 12px;
      font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s ease;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #ff8c5a); color: white; }
    .btn-primary:hover { box-shadow: 0 4px 20px rgba(255, 107, 53, 0.4); }
    .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text-primary); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-block { width: 100%; }
    .btn-add {
      background: linear-gradient(135deg, var(--accent), #ff8c5a); color: white;
      padding: 16px 32px; font-size: 18px; border-radius: 16px;
      box-shadow: 0 4px 20px rgba(255, 107, 53, 0.3);
    }
    .btn-checkin {
      background: var(--bg-card); color: var(--text-primary);
      border: 2px solid var(--border); padding: 10px 20px; border-radius: 12px;
      font-weight: 600; min-width: 80px;
    }
    .btn-checkin:hover { border-color: var(--accent); }
    .btn-checkin.checked { background: var(--success); border-color: var(--success); color: var(--primary); }
    .btn-back {
      background: var(--bg-card); border: none; color: var(--text-primary);
      width: 40px; height: 40px; border-radius: 12px; font-size: 20px; cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-back:hover { background: var(--border); }
    .btn-icon-only {
      background: var(--bg-card); border: none; color: var(--text-primary);
      width: 40px; height: 40px; border-radius: 12px; font-size: 16px; cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-icon-only:hover { background: var(--border); }
    .bottom-actions {
      position: absolute; bottom: 72px; left: 0; right: 0;
      display: flex; justify-content: center; padding: 0 20px; z-index: 10;
    }
    .bottom-nav {
      position: absolute; bottom: 0; left: 0; right: 0;
      display: flex; justify-content: space-around;
      background: var(--secondary); border-top: 1px solid var(--border);
      padding: 6px 0; padding-bottom: max(6px, env(safe-area-inset-bottom));
      z-index: 100;
    }
    .nav-btn {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      background: none; border: none; color: var(--text-secondary);
      padding: 6px 24px; border-radius: 10px; cursor: pointer; transition: all 0.2s ease;
    }
    .nav-btn.active { color: var(--accent); }
    .nav-icon { font-size: 18px; }
    .habit-list { display: flex; flex-direction: column; gap: 12px; }
    .empty-state { text-align: center; padding: 48px 20px; }
    .empty-icon { font-size: 60px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 18px; margin-bottom: 8px; }
    .empty-state p { color: var(--text-secondary); font-size: 13px; line-height: 1.6; }
    .habit-card {
      display: flex; align-items: center; gap: 12px;
      background: var(--bg-card); padding: 12px 16px; border-radius: 14px;
      box-shadow: 0 2px 12px var(--shadow);
    }
    .habit-info { flex: 1; display: flex; align-items: center; gap: 12px; cursor: pointer; min-width: 0; }
    .habit-icon {
      font-size: 28px; width: 44px; height: 44px; display: flex; align-items: center;
      justify-content: center; background: rgba(255, 255, 255, 0.05); border-radius: 10px; flex-shrink: 0;
    }
    .habit-details { flex: 1; min-width: 0; overflow: hidden; }
    .habit-name {
      font-size: 15px; font-weight: 600; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .habit-streak { font-size: 12px; color: var(--accent); font-weight: 500; }
    .habit-progress-ring { width: 44px; height: 44px; position: relative; flex-shrink: 0; }
    .habit-progress-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 3; }
    .ring-fill { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round; }
    .ring-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 10px; font-weight: 600; color: var(--text-secondary); }
    .stats-card { display: flex; justify-content: space-around; background: var(--bg-card); padding: 16px; border-radius: 14px; margin-bottom: 16px; }
    .stat-item { text-align: center; }
    .stat-value { display: block; font-size: 24px; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
    .progress-section { margin-bottom: 20px; }
    .progress-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #ff8c5a); border-radius: 4px; }
    .progress-text { text-align: center; font-size: 13px; color: var(--text-secondary); }
    .form { display: flex; flex-direction: column; gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
    .form-input {
      background: var(--bg-card); border: 2px solid var(--border); border-radius: 12px;
      padding: 12px 14px; font-size: 15px; color: var(--text-primary);
    }
    .form-input:focus { outline: none; border-color: var(--accent); }
    .icon-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .icon-option {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      font-size: 26px; background: var(--bg-card); border: 2px solid var(--border);
      border-radius: 12px; cursor: pointer;
    }
    .icon-option:hover, .icon-option.selected { border-color: var(--accent); }
    .icon-option.selected { background: rgba(255,107,53,0.2); }
    .settings-list { display: flex; flex-direction: column; gap: 20px; }
    .settings-group-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .settings-item {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg-card); padding: 14px 16px; border-radius: 12px; margin-bottom: 10px;
    }
    .settings-item-info { display: flex; align-items: center; gap: 12px; flex: 1; }
    .settings-icon { font-size: 22px; }
    .settings-item-title { font-size: 14px; font-weight: 600; }
    .settings-item-desc { font-size: 11px; color: var(--text-secondary); }
    .settings-item.about { flex-direction: column; align-items: flex-start; }
    .app-name { font-size: 15px; font-weight: 600; }
    .app-version { font-size: 11px; color: var(--text-secondary); }
    .app-desc { font-size: 12px; color: var(--text-secondary); }
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000;
      padding: 20px;
    }
    .modal-content { background: var(--bg-card); border-radius: 16px; padding: 24px; max-width: 320px; width: 100%; }
    .modal-message { font-size: 16px; text-align: center; margin-bottom: 20px; line-height: 1.5; }
    .modal-buttons { display: flex; gap: 12px; }
    .modal-buttons .btn { flex: 1; }
    .btn-cancel { background: var(--border); color: var(--text-primary); }
    .btn-confirm { background: var(--accent); color: white; }
    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: var(--bg-card); color: var(--text-primary);
      padding: 12px 24px; border-radius: 12px; font-size: 14px;
      box-shadow: 0 4px 20px var(--shadow); z-index: 1001;
      opacity: 0; transition: all 0.3s ease;
    }
    .toast.show { opacity: 1; }
    .install-banner {
      position: fixed; bottom: 60px; left: 20px; right: 20px;
      background: var(--bg-card); border-radius: 12px; padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 4px 20px var(--shadow); z-index: 99;
    }
    .install-banner.hidden { display: none; }
    .install-icon { font-size: 24px; }
    .install-info { flex: 1; }
    .install-title { font-size: 14px; font-weight: 600; }
    .install-desc { font-size: 11px; color: var(--text-secondary); }
    .btn-install { background: var(--accent); color: white; padding: 8px 16px; border-radius: 8px; font-size: 14px; border: none; cursor: pointer; }
    @media (max-width: 380px) {
      .habit-card { flex-wrap: wrap; }
      .habit-progress-ring { order: -1; width: 40px; height: 40px; }
      .btn-checkin { width: 100%; margin-top: 8px; }
    }
    @media (min-width: 768px) {
      #app { max-width: 480px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="install-banner hidden" id="installBanner">
    <span class="install-icon">📱</span>
    <div class="install-info">
      <p class="install-title">添加到主屏幕</p>
      <p class="install-desc">获得全屏体验</p>
    </div>
    <button class="btn-install" id="installBtn">添加</button>
  </div>

  <script>
    const Utils = {
      generateId() { return 'h_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9); },
      getToday() { return this.formatDate(new Date()); },
      formatDate(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      },
      parseDate(dateStr) {
        const [year, month, day] = dateStr.split('-').map(Number);
        return new Date(year, month - 1, day);
      },
      addDays(date, days) { const result = new Date(date); result.setDate(result.getDate() + days); return result; },
      daysBetween(date1, date2) {
        const d1 = typeof date1 === 'string' ? this.parseDate(date1) : date1;
        const d2 = typeof date2 === 'string' ? this.parseDate(date2) : date2;
        return Math.floor(Math.abs(d2 - d1) / (1000 * 60 * 60 * 24));
      },
      showToast(message, duration = 2000) {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        requestAnimationFrame(() => toast.classList.add('show'));
        setTimeout(() => {
          toast.classList.remove('show');
          setTimeout(() => toast.remove(), 300);
        }, duration);
      },
      showConfirm(message) {
        return new Promise((resolve) => {
          const overlay = document.createElement('div');
          overlay.className = 'modal-overlay';
          overlay.innerHTML = `
            <div class="modal-content">
              <p class="modal-message">${message}</p>
              <div class="modal-buttons">
                <button class="btn btn-cancel" data-action="cancel">取消</button>
                <button class="btn btn-confirm" data-action="confirm">确认</button>
              </div>
            </div>
          `;
          document.body.appendChild(overlay);
          const handleClick = (e) => {
            const action = e.target.dataset.action;
            if (action) { overlay.remove(); resolve(action === 'confirm'); }
          };
          document.addEventListener('click', handleClick, { once: true });
        });
      }
    };

    const Storage = {
      KEY: 'habits',
      save(habits) {
        try { localStorage.setItem(this.KEY, JSON.stringify(habits)); return true; }
        catch (e) { console.error('保存失败', e); return false; }
      },
      load() {
        try {
          const data = localStorage.getItem(this.KEY);
          if (!data) return this.initDefault();
          return JSON.parse(data);
        } catch (e) { console.error('加载失败', e); return this.initDefault(); }
      },
      initDefault() {
        const defaults = [
          { id: 'default_1', name: '每日健身', icon: '💪', createdAt: Utils.getToday(), checkinDates: [] },
          { id: 'default_2', name: '早起阅读', icon: '📚', createdAt: Utils.getToday(), checkinDates: [] },
          { id: 'default_3', name: '多喝水', icon: '💧', createdAt: Utils.getToday(), checkinDates: [] }
        ];
        this.save(defaults);
        return defaults;
      },
      exportData() {
        return JSON.stringify({ version: '1.0', exportDate: new Date().toISOString(), habits: this.load() }, null, 2);
      },
      importData(jsonStr) {
        try {
          const data = JSON.parse(jsonStr);
          if (!data.habits || !Array.isArray(data.habits)) throw new Error('数据格式无效');
          data.habits.forEach(h => { if (!h.id || !h.name || !h.createdAt) throw new Error('数据不完整'); });
          this.save(data.habits);
          return { success: true, count: data.habits.length };
        } catch (e) { return { success: false, error: e.message }; }
      }
    };

    const Habits = {
      getAll() { return Storage.load(); },
      get(id) { return this.getAll().find(h => h.id === id); },
      add(name, icon = '📌') {
        const habits = this.getAll();
        const newHabit = { id: Utils.generateId(), name: name.trim(), icon, createdAt: Utils.getToday(), checkinDates: [] };
        habits.push(newHabit);
        Storage.save(habits);
        return newHabit;
      },
      update(id, data) {
        const habits = this.getAll();
        const index = habits.findIndex(h => h.id === id);
        if (index === -1) return null;
        if (data.name !== undefined) habits[index].name = data.name.trim();
        if (data.icon !== undefined) habits[index].icon = data.icon;
        Storage.save(habits);
        return habits[index];
      },
      remove(id) {
        const habits = this.getAll();
        const index = habits.findIndex(h => h.id === id);
        if (index === -1) return false;
        habits.splice(index, 1);
        Storage.save(habits);
        return true;
      },
      hasChecked(habit, date) { return habit.checkinDates.includes(date); },
      doCheck(id, date) {
        const habits = this.getAll();
        const habit = habits.find(h => h.id === id);
        if (!habit) return false;
        if (!habit.checkinDates.includes(date)) {
          habit.checkinDates.push(date);
          habit.checkinDates.sort();
          Storage.save(habits);
        }
        return true;
      },
      undoCheck(id, date) {
        const habits = this.getAll();
        const habit = habits.find(h => h.id === id);
        if (!habit) return false;
        const index = habit.checkinDates.indexOf(date);
        if (index > -1) { habit.checkinDates.splice(index, 1); Storage.save(habits); }
        return true;
      },
      getStreak(habit) {
        if (!habit.checkinDates || habit.checkinDates.length === 0) return 0;
        const today = Utils.getToday();
        const sorted = [...habit.checkinDates].sort().reverse();
        let streak = 0;
        let currentDate = sorted[0] === today ? new Date() : Utils.addDays(new Date(), -1);
        for (const dateStr of sorted) {
          const expected = Utils.formatDate(currentDate);
          if (dateStr === expected) { streak++; currentDate = Utils.addDays(currentDate, -1); }
          else if (dateStr < expected) break;
        }
        return streak;
      },
      getProgress(habit) {
        const today = Utils.getToday();
        const startDate = habit.createdAt;
        const checkedDays = habit.checkinDates.filter(d => d >= startDate && d <= today).length;
        const progress = Math.min((checkedDays / 21) * 100, 100);
        return { checkedDays, progress, remaining: Math.max(0, 21 - checkedDays) };
      }
    };

    const Checkin = {
      doCheck(id) {
        const today = Utils.getToday();
        const habit = Habits.get(id);
        if (!habit) return { success: false, error: '习惯不存在' };
        if (Habits.hasChecked(habit, today)) return { success: false, error: '今日已打卡' };
        Habits.doCheck(id, today);
        const updated = Habits.get(id);
        const streak = Habits.getStreak(updated);
        const progress = Habits.getProgress(updated);
        return { success: true, streak, progress, isCompleted: progress.checkedDays >= 21 };
      },
      undoCheck(id, date) {
        const habit = Habits.get(id);
        if (!habit) return { success: false, error: '习惯不存在' };
        if (!Habits.hasChecked(habit, date)) return { success: false, error: '该日期未打卡' };
        Habits.undoCheck(id, date);
        return { success: true };
      },
      getStats(id) {
        const habit = Habits.get(id);
        if (!habit) return null;
        const today = Utils.getToday();
        const totalDays = Utils.daysBetween(habit.createdAt, today) + 1;
        const checkedDays = habit.checkinDates.filter(d => d <= today).length;
        const streak = Habits.getStreak(habit);
        const progress = Habits.getProgress(habit);
        return { totalDays, checkedDays, streak, ...progress };
      }
    };

    const Router = {
      routes: new Map(),
      navigate(path) { window.location.hash = path; },
      handle() {
        const hash = window.location.hash.slice(1) || '/';
        const [path, query] = hash.split('?');
        const params = {};
        if (query) query.split('&').forEach(p => { const [k, v] = p.split('='); params[k] = decodeURIComponent(v); });
        
        const matched = this.matchRoute(path);
        if (matched) {
          const handler = this.routes.get(matched.route);
          if (handler) handler({ ...params, ...matched.params });
        } else {
          this.navigate('/');
        }
      },
      matchRoute(path) {
        for (const [routePath, handler] of this.routes) {
          const routeParts = routePath.split('/').filter(Boolean);
          const pathParts = path.split('/').filter(Boolean);
          if (routeParts.length !== pathParts.length) continue;
          const params = {};
          let match = true;
          for (let i = 0; i < routeParts.length; i++) {
            if (routeParts[i].startsWith(':')) params[routeParts[i].slice(1)] = pathParts[i];
            else if (routeParts[i] !== pathParts[i]) { match = false; break; }
          }
          if (match) return { route: routePath, params };
        }
        return this.routes.has(path) ? { route: path, params: {} } : null;
      },
      init() {
        window.addEventListener('hashchange', () => this.handle());
        window.addEventListener('load', () => this.handle());
      }
    };

    const ICONS = ['💪', '📚', '🏃', '💧', '🧘', '💤', '🥗', '✍️', '🎯', '🌅', '😴', '🚭', '💰', '🎨', '🎵'];
    const WEEKDAYS = ['日', '一', '二', '三', '四', '五', '六'];
    const MONTHS = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];

    const UI = {
      renderHome() {
        const habits = Habits.getAll();
        const today = Utils.getToday();
        const html = `
          <div class="page">
            <div class="header">
              <h1 class="title">21+</h1>
              <p class="subtitle">坚持21天，养成好习惯</p>
            </div>
            <div class="habit-list">
              ${habits.map(h => this.renderCard(h, today)).join('')}
            </div>
            <div class="bottom-actions">
              <button class="btn btn-add" id="addBtn">+ 添加习惯</button>
            </div>
            <nav class="bottom-nav">
              <button class="nav-btn active"><span class="nav-icon">🏠</span><span>首页</span></button>
              <button class="nav-btn" onclick="location.hash='#/settings'"><span class="nav-icon">⚙️</span><span>设置</span></button>
            </nav>
          </div>
        `;
        document.getElementById('app').innerHTML = html;
        this.bindHomeEvents();
      },
      renderCard(habit, today) {
        const isChecked = Habits.hasChecked(habit, today);
        const streak = Habits.getStreak(habit);
        const progress = Habits.getProgress(habit);
        return `
          <div class="habit-card">
            <div class="habit-info" onclick="location.hash='#/detail/${habit.id}'">
              <div class="habit-icon">${habit.icon}</div>
              <div class="habit-details">
                <h3 class="habit-name">${habit.name}</h3>
                <p class="habit-streak">连续 ${streak} 天</p>
              </div>
            </div>
            <div class="habit-progress-ring">
              <svg viewBox="0 0 36 36">
                <path class="ring-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                <path class="ring-fill" stroke-dasharray="${progress.progress}, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
              </svg>
              <span class="ring-text">${Math.round(progress.progress)}%</span>
            </div>
            <button class="btn-checkin ${isChecked ? 'checked' : ''}" data-id="${habit.id}">${isChecked ? '✓' : '打卡'}</button>
          </div>
        `;
      },
      bindHomeEvents() {
        document.getElementById('addBtn').addEventListener('click', () => Router.navigate('/add'));
        document.querySelectorAll('.btn-checkin').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const result = Checkin.doCheck(btn.dataset.id);
            if (result.success) {
              Utils.showToast(result.isCompleted ? '🎉 恭喜完成21天挑战！' : `打卡成功！连续 ${result.streak} 天`);
              this.renderHome();
            } else {
              Utils.showToast(result.error);
            }
          });
        });
      },
      renderDetail(params) {
        const habit = Habits.get(params.id);
        if (!habit) { Router.navigate('/'); return; }
        const stats = Checkin.getStats(params.id);
        const now = new Date();
        const calendar = this.getCalendar(now.getFullYear(), now.getMonth());
        const html = `
          <div class="page">
            <div class="header">
              <button class="btn-back" onclick="location.hash='/'">←</button>
              <div class="header-content">
                <span class="header-icon">${habit.icon}</span>
                <h1 class="header-title">${habit.name}</h1>
              </div>
              <div class="header-actions">
                <button class="btn-icon-only" onclick="location.hash='#/edit/${params.id}'">✏️</button>
                <button class="btn-icon-only" id="delBtn">🗑️</button>
              </div>
            </div>
            <div class="stats-card">
              <div class="stat-item"><span class="stat-value">${stats.streak}</span><span class="stat-label">连续天数</span></div>
              <div class="stat-item"><span class="stat-value">${stats.checkedDays}</span><span class="stat-label">已打卡</span></div>
              <div class="stat-item"><span class="stat-value">${stats.remaining}</span><span class="stat-label">剩余</span></div>
            </div>
            <div class="progress-section">
              <div class="progress-bar"><div class="progress-fill" style="width: ${stats.progress}%"></div></div>
              <p class="progress-text">${stats.checkedDays >= 21 ? '🎉 挑战完成！' : `已完成 ${stats.checkedDays}/21 天`}</p>
            </div>
            <div style="background: #1f2937; border-radius: 14px; padding: 14px;">
              <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                <button class="btn-back" style="width:36px;height:36px;font-size:14px" id="prevMonth">←</button>
                <h3 style="font-size:15px;font-weight:600">${MONTHS[now.getMonth()]} ${now.getFullYear()}</h3>
                <div style="width:36px"></div>
              </div>
              <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px">
                ${WEEKDAYS.map(d => `<div style="text-align:center;font-size:11px;color:#94a3b8">${d}</div>`).join('')}
              </div>
              <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">
                ${calendar.map(day => day === null ? '<div></div>' : `<div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:13px;background:${day.checked ? '#4ade80' : 'rgba(255,255,255,0.05)'} ${day.today ? ';border:2px solid #ff6b35' : ''}" data-date="${day.date}">${day.day}${day.checked ? '✓' : ''}</div>`).join('')}
              </div>
            </div>
          </div>
        `;
        document.getElementById('app').innerHTML = html;
        document.getElementById('delBtn').addEventListener('click', async () => {
          if (await Utils.showConfirm('确定要删除吗？')) {
            Habits.remove(params.id);
            Utils.showToast('已删除');
            Router.navigate('/');
          }
        });
      },
      getCalendar(year, month) {
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const today = Utils.getToday();
        const result = [];
        for (let i = 0; i < firstDay; i++) result.push(null);
        for (let day = 1; day <= daysInMonth; day++) {
          const date = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
          result.push({ day, date, checked: false, today: date === today });
        }
        return result;
      },
      renderAddEdit(params) {
        const habit = params.id ? Habits.get(params.id) : null;
        const isEdit = !!habit;
        const selectedIcon = habit?.icon || ICONS[0];
        const html = `
          <div class="page">
            <div class="header">
              <button class="btn-back" onclick="location.hash='${params.id ? `/detail/${params.id}` : '/'}'">←</button>
              <h1 class="header-title">${isEdit ? '编辑习惯' : '添加习惯'}</h1>
              <div class="header-spacer"></div>
            </div>
            <form class="form" id="habitForm">
              <div class="form-group">
                <label class="form-label">习惯名称</label>
                <input type="text" class="form-input" id="habitName" value="${habit?.name || ''}" placeholder="例如：每日健身" maxlength="20" required>
              </div>
              <div class="form-group">
                <label class="form-label">选择图标</label>
                <div class="icon-grid">
                  ${ICONS.map(icon => `<button type="button" class="icon-option ${icon === selectedIcon ? 'selected' : ''}" data-icon="${icon}">${icon}</button>`).join('')}
                </div>
                <input type="hidden" id="selectedIcon" value="${selectedIcon}">
              </div>
              <button type="submit" class="btn btn-primary btn-block">${isEdit ? '保存修改' : '创建习惯'}</button>
            </form>
          </div>
        `;
        document.getElementById('app').innerHTML = html;
        document.querySelectorAll('.icon-option').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.icon-option').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            document.getElementById('selectedIcon').value = btn.dataset.icon;
          });
        });
        document.getElementById('habitForm').addEventListener('submit', (e) => {
          e.preventDefault();
          const name = document.getElementById('habitName').value.trim();
          const icon = document.getElementById('selectedIcon').value;
          if (!name) { Utils.showToast('请输入习惯名称'); return; }
          if (isEdit) {
            Habits.update(params.id, { name, icon });
            Utils.showToast('修改成功');
            Router.navigate(`/detail/${params.id}`);
          } else {
            Habits.add(name, icon);
            Utils.showToast('创建成功');
            Router.navigate('/');
          }
        });
      },
      renderSettings() {
        const html = `
          <div class="page">
            <div class="header">
              <button class="btn-back" onclick="location.hash='/'">←</button>
              <h1 class="header-title">设置</h1>
              <div class="header-spacer"></div>
            </div>
            <div class="settings-list">
              <div>
                <h3 class="settings-group-title">数据管理</h3>
                <div class="settings-item">
                  <div class="settings-item-info">
                    <span class="settings-icon">📤</span>
                    <div><p class="settings-item-title">导出数据</p><p class="settings-item-desc">导出为JSON文件</p></div>
                  </div>
                  <button class="btn btn-outline" id="exportBtn">导出</button>
                </div>
                <div class="settings-item">
                  <div class="settings-item-info">
                    <span class="settings-icon">📥</span>
                    <div><p class="settings-item-title">导入数据</p><p class="settings-item-desc">从JSON文件恢复</p></div>
                  </div>
                  <button class="btn btn-outline" id="importBtn">导入</button>
                  <input type="file" id="importFile" accept=".json" style="display:none">
                </div>
              </div>
              <div>
                <h3 class="settings-group-title">关于</h3>
                <div class="settings-item about">
                  <p class="app-name">21+ 打卡APP</p>
                  <p class="app-version">版本 1.0.0</p>
                  <p class="app-desc">坚持21天，养成好习惯</p>
                </div>
              </div>
            </div>
            <nav class="bottom-nav">
              <button class="nav-btn" onclick="location.hash='/'"><span class="nav-icon">🏠</span><span>首页</span></button>
              <button class="nav-btn active"><span class="nav-icon">⚙️</span><span>设置</span></button>
            </nav>
          </div>
        `;
        document.getElementById('app').innerHTML = html;
        document.getElementById('exportBtn').addEventListener('click', () => {
          const data = Storage.exportData();
          const blob = new Blob([data], { type: 'application/json' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `21plus-backup-${Utils.getToday()}.json`;
          a.click();
          Utils.showToast('数据已导出');
        });
        document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
        document.getElementById('importFile').addEventListener('change', (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            const result = Storage.importData(ev.target.result);
            if (result.success) { Utils.showToast(`导入 ${result.count} 个习惯`); Router.navigate('/'); }
            else Utils.showToast('导入失败: ' + result.error);
          };
          reader.readAsText(file);
        });
      }
    };

    let installPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      installPrompt = e;
      document.getElementById('installBanner').classList.remove('hidden');
    });

    document.getElementById('installBtn').addEventListener('click', () => {
      if (installPrompt) {
        installPrompt.prompt();
        installPrompt.userChoice.then(choice => {
          if (choice.outcome === 'accepted') {
            document.getElementById('installBanner').classList.add('hidden');
          }
        });
      }
    });

    Router.routes.set('/', () => UI.renderHome());
    Router.routes.set('/detail/:id', (params) => UI.renderDetail(params));
    Router.routes.set('/add', () => UI.renderAddEdit({}));
    Router.routes.set('/edit/:id', (params) => UI.renderAddEdit(params));
    Router.routes.set('/settings', () => UI.renderSettings());
    Router.init();

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => Router.handle());
    } else {
      Router.handle();
    }
  </script>
</body>
</html>
